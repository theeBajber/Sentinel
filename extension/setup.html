<!-- extension/setup.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel Setup</title>
    <style>
      :root {
        --color-bg-primary: #0c1324;
        --color-bg-card: #191f31;
        --color-accent-blue: #b7c4ff;
        --color-accent-rose: #ffb4ab;
        --color-text-primary: #dce1fb;
        --color-text-muted: #c6c6cd;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 480px;
        width: 100%;
        text-align: center;
      }

      .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(
          135deg,
          var(--color-accent-blue),
          var(--color-accent-rose)
        );
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 40px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      p {
        color: var(--color-text-muted);
        margin-bottom: 32px;
        line-height: 1.6;
      }

      .form-group {
        background: var(--color-bg-card);
        border-radius: 16px;
        padding: 24px;
        text-align: left;
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-text-muted);
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: var(--color-text-primary);
        font-size: 14px;
        font-family: monospace;
      }

      input:focus {
        outline: none;
        border-color: var(--color-accent-blue);
      }

      .hint {
        font-size: 12px;
        color: var(--color-text-muted);
        margin-top: 8px;
      }

      button {
        width: 100%;
        padding: 14px 24px;
        border-radius: 12px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        background: var(--color-accent-blue);
        color: var(--color-bg-primary);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(183, 196, 255, 0.3);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .skip {
        display: block;
        margin-top: 16px;
        color: var(--color-text-muted);
        text-decoration: none;
        font-size: 13px;
      }

      .skip:hover {
        color: var(--color-accent-blue);
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
      }

      .status.success {
        display: block;
        background: rgba(143, 212, 178, 0.2);
        color: #8fd4b2;
      }

      .status.error {
        display: block;
        background: rgba(242, 167, 160, 0.2);
        color: #f2a7a0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🛡️</div>
      <h1>Welcome to Sentinel</h1>
      <p>
        Enter your API key to enable full protection features. You can find this
        in your dashboard under Settings.
      </p>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input
          type="text"
          id="apiKey"
          placeholder="sent_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          autocomplete="off"
        />
        <p class="hint">Format: sent_ followed by 32 characters</p>
      </div>

      <button id="saveBtn">Save & Activate</button>
      <div id="status" class="status"></div>

      <a href="#" class="skip" id="skipBtn"
        >Continue without API key (limited features)</a
      >
    </div>
    <script src="setup.js"></script>
  </body>
</html>
