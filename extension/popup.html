<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Phishing URL Guard</title>
    <style>
      body {
        font-family: system-ui, Arial;
        min-width: 320px;
        min-height: 220px;
        background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }
      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.1);
        padding: 28px 24px 18px 24px;
        width: 100%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .logo {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        box-shadow: 0 2px 8px #6366f122;
      }
      .headline {
        font-size: 20px;
        font-weight: 700;
        color: #3730a3;
        margin: 0 0 4px 0;
        text-align: center;
      }
      .subtitle {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 18px;
        text-align: center;
      }
      #status {
        font-size: 16px;
        font-weight: 500;
        margin: 18px 0 10px 0;
        padding: 10px 0;
        width: 100%;
        text-align: center;
        border-radius: 8px;
        background: #f3f4f6;
        color: #64748b;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .footer {
        margin-top: 18px;
        font-size: 12px;
        color: #a1a1aa;
        text-align: center;
      }
      .dashboard-link {
        color: #6366f1;
        text-decoration: none;
        font-weight: 600;
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg
          style="width: 28px; height: 28px; color: white"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
          />
        </svg>
      </div>
      <div class="headline">Phishing URL Guard</div>
      <div class="subtitle">Protecting you from malicious links</div>
      <div id="status">Ready</div>
      <div class="footer">
        <span>Need more? </span>
        <a href="http://localhost:3000" target="_blank" class="dashboard-link"
          >Open Dashboard</a
        >
      </div>
    </div>
    <script>
      (async function () {
        const API_BASE_DEFAULT = "http://localhost:4000";
        const apiBase = await new Promise((r) =>
          chrome.storage.sync.get({ apiBase: API_BASE_DEFAULT }, (v) =>
            r(v.apiBase),
          ),
        );
        const [tab] = await chrome.tabs.query({
          active: true,
          currentWindow: true,
        });
        if (!tab || !tab.url) return;
        const statusEl = document.getElementById("status");
        statusEl.textContent = "Scanning...";
        statusEl.style.background = "#e0e7ff";
        statusEl.style.color = "#6366f1";
        try {
          const res = await fetch(apiBase + "/scan-url", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ url: tab.url }),
          });
          const json = await res.json();
          let verdictColor = "#64748b",
            verdictBg = "#f3f4f6";
          if (json.verdict === "unsafe") {
            verdictColor = "#dc2626";
            verdictBg = "#fee2e2";
          } else if (json.verdict === "suspicious") {
            verdictColor = "#ca8a04";
            verdictBg = "#fef9c3";
          } else if (json.verdict === "safe") {
            verdictColor = "#16a34a";
            verdictBg = "#f0fdf4";
          }
          statusEl.textContent = `Verdict: ${json.verdict} (score ${Math.round(json.score)})`;
          statusEl.style.background = verdictBg;
          statusEl.style.color = verdictColor;
        } catch (e) {
          statusEl.textContent = "Scan failed";
          statusEl.style.background = "#fee2e2";
          statusEl.style.color = "#dc2626";
        }
      })();
    </script>
  </body>
</html>
