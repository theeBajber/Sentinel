<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel</title>
    <style>
      :root {
        --color-bg-primary: #0c1324;
        --color-bg-muted: #0c1324f9;
        --color-bg-card: #191f31;
        --color-bg-hover: #1c2337;
        --color-accent-blue: #b7c4ff;
        --color-accent-rose: #ffb4ab;
        --color-accent-amber: #dec29a;
        --color-text-primary: #dce1fb;
        --color-text-muted: #c6c6cd;
        --color-danger: #f2a7a0;
        --color-warning: #e6c38a;
        --color-success: #8fd4b2;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        min-height: 400px;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      .container {
        padding: 16px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--color-bg-card);
      }

      .logo {
        width: 40px;
        height: 40px;
      }

      .title {
        flex: 1;
      }

      .title h1 {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-text-primary);
        margin: 0;
      }

      .title p {
        font-size: 12px;
        color: var(--color-text-muted);
        margin: 2px 0 0 0;
      }

      /* Status Card */
      .status-card {
        background: var(--color-bg-card);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid transparent;
        transition: all 0.3s ease;
      }

      .status-card.active {
        border-color: var(--color-success);
      }

      .status-card.inactive {
        border-color: var(--color-danger);
        opacity: 0.7;
      }

      .status-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .status-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-text-muted);
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
        background: var(--color-bg-hover);
      }

      .status-badge.active {
        color: var(--color-success);
      }

      .status-badge.inactive {
        color: var(--color-danger);
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      .status-badge.active .status-indicator {
        background: var(--color-success);
      }

      .status-badge.inactive .status-indicator {
        background: var(--color-danger);
        animation: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* Toggle Switch */
      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 12px;
        border-top: 1px solid var(--color-bg-hover);
      }

      .toggle-label {
        font-size: 13px;
        color: var(--color-text-primary);
      }

      .toggle-switch {
        position: relative;
        width: 48px;
        height: 24px;
        background: var(--color-bg-hover);
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.3s;
      }

      .toggle-switch.active {
        background: var(--color-success);
      }

      .toggle-switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        transition: transform 0.3s;
      }

      .toggle-switch.active::after {
        transform: translateX(24px);
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }

      .stat-card {
        background: var(--color-bg-card);
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }

      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-accent-blue);
        margin-bottom: 4px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Current Site */
      .site-card {
        background: var(--color-bg-card);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 16px;
      }

      .site-header {
        font-size: 11px;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .site-url {
        font-size: 13px;
        color: var(--color-text-primary);
        word-break: break-all;
        margin-bottom: 8px;
      }

      .site-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 10px;
        border-radius: 6px;
        background: var(--color-bg-hover);
        width: fit-content;
      }

      .site-status.safe {
        color: var(--color-success);
      }

      .site-status.suspicious {
        color: var(--color-warning);
      }

      .site-status.unsafe {
        color: var(--color-danger);
      }

      .site-status.scanning {
        color: var(--color-accent-blue);
      }

      /* Action Buttons */
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 8px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--color-accent-blue);
        color: var(--color-bg-primary);
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        border: 1px solid var(--color-bg-hover);
      }

      .btn-secondary:hover {
        background: var(--color-bg-hover);
      }

      .btn-whitelist {
        background: transparent;
        color: var(--color-accent-amber);
        border: 1px solid var(--color-accent-amber);
        font-size: 12px;
        padding: 8px;
      }

      .btn-whitelist:hover {
        background: var(--color-accent-amber);
        color: var(--color-bg-primary);
      }

      /* Footer */
      .footer {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--color-bg-card);
        text-align: center;
      }

      .footer a {
        color: var(--color-accent-blue);
        text-decoration: none;
        font-size: 12px;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      /* Loading State */
      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--color-bg-hover);
        border-top-color: var(--color-accent-blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Hidden */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <!-- <div class="logo">🛡️</div> -->
        <img src="./icons/icon.png" class="logo" />
        <div class="title">
          <h1>Sentinel</h1>
          <p>Phishing Protection</p>
        </div>
      </div>

      <!-- Status Card -->
      <div class="status-card active" id="statusCard">
        <div class="status-header">
          <span class="status-label">Protection Status</span>
          <div class="status-badge active" id="statusBadge">
            <span class="status-indicator"></span>
            <span id="statusText">Active</span>
          </div>
        </div>
        <div class="toggle-container">
          <span class="toggle-label">Enable Protection</span>
          <div class="toggle-switch active" id="toggleSwitch"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="blockedCount">0</div>
          <div class="stat-label">Threats Blocked</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="sessionTime">0m</div>
          <div class="stat-label">Session Time</div>
        </div>
      </div>

      <!-- Current Site -->
      <div class="site-card" id="siteCard">
        <div class="site-header">Current Website</div>
        <div class="site-url" id="currentUrl">Loading...</div>
        <div class="site-status scanning" id="siteStatus">
          <span class="loading"></span>
          Scanning...
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <a href="https://sentinel-zeta-pied.vercel.app" target="_blank">
          sentinel-zeta-pied.vercel.app
        </a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
